apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-pager
  namespace: k8s-pager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-pager
  template:
    metadata:
      labels:
        app: k8s-pager
    spec:
      serviceAccountName: k8s-pager
      containers:
        - name: k8s-pager
          image: ghcr.io/nevalla/k8s-pager:latest
          env:
            - name: CLUSTER_NAME
              value: ""  # set to your cluster identifier
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: k8s-pager
                  key: slack-webhook-url
            # - name: SLACK_MENTION
            #   value: ""
            # - name: TELEGRAM_BOT_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: k8s-pager
            #       key: telegram-bot-token
            # - name: TELEGRAM_CHAT_ID
            #   value: ""
            # - name: TELEGRAM_MENTION
            #   value: "@openclaw"
            # - name: WHATSAPP_API_URL
            #   value: ""
            # - name: WHATSAPP_API_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: k8s-pager
            #       key: whatsapp-api-token
            # - name: WHATSAPP_RECIPIENT
            #   value: ""
            # - name: WHATSAPP_MENTION
            #   value: "@openclaw"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-pager
                  key: llm-api-key
            - name: THRESHOLD
              value: "5"
            - name: WINDOW_SIZE
              value: "10m"
            - name: COOLDOWN
              value: "1h"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
